{{define "form/tlsSettings"}}
<!-- tls enable -->
<a-form layout="inline" v-if="inbound.canEnableTls()">
    <a-form-item label="tls">
        <a-switch v-model="inbound.tls" :disabled="inbound.isTlsRequired()">
        </a-switch>
        <span v-if="inbound.isTlsRequired()" style="color: #faad14; margin-left: 8px; font-size: 12px;">此协议必须开启 TLS</span>
    </a-form-item>
    <a-form-item v-if="inbound.canEnableXTls()" label="xtls">
        <a-switch v-model="inbound.xtls"></a-switch>
    </a-form-item>
    <a-form-item v-if="inbound.canEnableReality()" label="reality">
        <a-switch v-model="inbound.reality"></a-switch>
    </a-form-item>
    <a-form-item v-if="!inbound.reality" label="域名">
        <a-input v-model.trim="inbound.stream.tls.server" placeholder="example.com"></a-input>
    </a-form-item>
    <a-form-item v-if="!inbound.reality" label="ACME">
        <a-input-search v-model.trim="acmeEmail" enter-button="一键申请 SSL"
                        placeholder="可选邮箱，留空自动生成"
                        :loading="acmeLoading"
                        @search="applyAcmeCert"></a-input-search>
    </a-form-item>
</a-form>

<!-- reality settings -->
<a-form v-if="inbound.reality" layout="inline">
    <a-form-item label="dest">
        <a-input v-model.trim="inbound.stream.reality.dest" placeholder="www.example.com:443"></a-input>
    </a-form-item>
    <a-form-item label="serverNames">
        <a-select mode="tags" v-model="inbound.stream.reality.serverNames" style="min-width: 240px;"></a-select>
    </a-form-item>
    <a-form-item label="privateKey">
        <a-input v-model.trim="inbound.stream.reality.privateKey">
            <a-icon slot="addonAfter" type="sync" @click="genX25519" style="cursor:pointer;" title="一键生成密钥对"/>
        </a-input>
    </a-form-item>
    <a-form-item label="publicKey">
        <a-input v-model.trim="inbound.stream.reality.publicKey" placeholder="用于分享链接 pbk">
            <a-icon slot="addonAfter" type="sync" @click="genX25519" style="cursor:pointer;" title="一键生成密钥对"/>
        </a-input>
    </a-form-item>
    <a-form-item label="shortIds">
        <a-select mode="tags" v-model="inbound.stream.reality.shortIds" style="min-width: 240px;"></a-select>
    </a-form-item>
    <a-form-item label="fingerprint">
        <a-select v-model="inbound.stream.reality.fingerprint" style="width: 140px;">
            <a-select-option value="chrome">chrome</a-select-option>
            <a-select-option value="firefox">firefox</a-select-option>
            <a-select-option value="safari">safari</a-select-option>
            <a-select-option value="ios">ios</a-select-option>
            <a-select-option value="android">android</a-select-option>
            <a-select-option value="edge">edge</a-select-option>
            <a-select-option value="random">random</a-select-option>
            <a-select-option value="randomized">randomized</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="show">
        <a-switch v-model="inbound.stream.reality.show"></a-switch>
    </a-form-item>
    <a-form-item label="xver">
        <a-input-number v-model="inbound.stream.reality.xver" :min="0"></a-input-number>
    </a-form-item>
</a-form>

<!-- tls settings -->
<a-form v-if="!inbound.reality && (inbound.tls || inbound.xtls)"
        layout="inline">
    <a-form-item label="alpn" placeholder="http/1.1,h2">
        <a-input v-model.trim="inbound.stream.tls.alpn"></a-input>
    </a-form-item>
    <a-form-item label="证书">
        <a-radio-group v-model="inbound.stream.tls.certs[0].useFile"
                       button-style="solid">
            <a-radio-button :value="true">certificate file path</a-radio-button>
            <a-radio-button :value="false">certificate file content</a-radio-button>
        </a-radio-group>
    </a-form-item>
    <template v-if="inbound.stream.tls.certs[0].useFile">
        <a-form-item label="公钥文件路径">
            <a-input v-model.trim="inbound.stream.tls.certs[0].certFile"></a-input>
        </a-form-item>
        <a-form-item label="密钥文件路径">
            <a-input v-model.trim="inbound.stream.tls.certs[0].keyFile"></a-input>
        </a-form-item>
    </template>
    <template v-else>
        <a-form-item label="公钥内容">
            <a-input type="textarea" :rows="2"
                     v-model="inbound.stream.tls.certs[0].cert"></a-input>
        </a-form-item>
        <a-form-item label="密钥内容">
            <a-input type="textarea" :rows="2"
                     v-model="inbound.stream.tls.certs[0].key"></a-input>
        </a-form-item>
    </template>
</a-form>
<a-form layout="inline" v-else-if="inbound.stream.network === 'tcp' && !inbound.isTlsRequired()">
    <a-form-item label="tcp-acceptProxyProtocol">
        <a-switch v-model="inbound.stream.tcp.acceptProxyProtocol"></a-switch>
    </a-form-item>
</a-form>
{{end}}
