<!DOCTYPE html>
<html lang="en">
{{template "head" .}}
<style>
    @media (min-width: 769px) {
        .ant-layout-content {
            margin: 24px 16px;
        }
    }

    .ant-col-sm-24 {
        margin-top: 10px;
    }

    .inbound-protocol-tag {
        font-size: 12px;
        font-weight: 500;
        border: none;
    }

    .inbound-stream-tag {
        font-size: 11px;
        padding: 0 6px;
        line-height: 20px;
        margin: 1px 2px;
    }

    .traffic-bar {
        height: 4px;
        border-radius: 2px;
        background: #f0f0f0;
        margin-top: 4px;
        overflow: hidden;
    }
    .traffic-bar-inner {
        height: 100%;
        border-radius: 2px;
        transition: width 0.3s;
    }
</style>
<body>
<a-layout id="app" v-cloak>
    {{ template "commonSider" . }}
    <a-layout id="content-layout">
        <a-layout-content>
            <a-spin :spinning="spinning" :delay="500" tip="loading">
                <transition name="list" appear>
                    <a-card style="margin-bottom: 20px;">
                        <a-row :gutter="16">
                            <a-col :xs="24" :sm="8">
                                <a-statistic title="总上传 / 下载" :value="sizeFormat(total.up) + ' / ' + sizeFormat(total.down)" :value-style="{ fontSize: '16px' }" />
                            </a-col>
                            <a-col :xs="24" :sm="8">
                                <a-statistic title="总用量" :value="sizeFormat(total.up + total.down)" :value-style="{ fontSize: '16px', color: '#1890ff' }" />
                            </a-col>
                            <a-col :xs="24" :sm="8">
                                <a-statistic title="入站数量" :value="dbInbounds.length" :value-style="{ fontSize: '16px', color: '#52c41a' }" />
                            </a-col>
                        </a-row>
                    </a-card>
                </transition>
                <transition name="list" appear>
                    <a-card>
                        <div slot="title" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                            <a-button type="primary" icon="plus" @click="openAddInbound">添加入站</a-button>
                            <a-input v-model="searchKey" placeholder="搜索入站..." allow-clear style="max-width: 240px;">
                                <a-icon slot="prefix" type="search"></a-icon>
                            </a-input>
                        </div>
                        <a-table :columns="columns" :row-key="dbInbound => dbInbound.id"
                                 :data-source="searchedInbounds"
                                 :loading="spinning" :scroll="{ x: 1200 }"
                                 :pagination="{ pageSize: 15, showSizeChanger: true, pageSizeOptions: ['10','15','20','50'], showTotal: total => '共 ' + total + ' 条' }"
                                 size="middle"
                                 @change="() => getDBInbounds()">
                            <template slot="action" slot-scope="text, dbInbound">
                                <a-dropdown :trigger="['click']">
                                    <a-button size="small" icon="menu"></a-button>
                                    <a-menu slot="overlay" @click="a => clickAction(a, dbInbound)">
                                        <a-menu-item v-if="dbInbound.hasLink()" key="qrcode">
                                            <a-icon type="qrcode"></a-icon>二维码
                                        </a-menu-item>
                                        <a-menu-item key="edit">
                                            <a-icon type="edit"></a-icon>编辑
                                        </a-menu-item>
                                        <a-menu-item key="resetTraffic">
                                            <a-icon type="retweet"></a-icon>重置流量
                                        </a-menu-item>
                                        <a-menu-item key="delete">
                                            <span style="color: #FF4D4F">
                                                <a-icon type="delete"></a-icon>删除
                                            </span>
                                        </a-menu-item>
                                    </a-menu>
                                </a-dropdown>
                            </template>
                            <template slot="protocol" slot-scope="text, dbInbound">
                                <a-tag :color="protocolColor(dbInbound.protocol)" class="inbound-protocol-tag">[[ protocolName(dbInbound.protocol) ]]</a-tag>
                            </template>
                            <template slot="traffic" slot-scope="text, dbInbound">
                                <div style="font-size: 12px;">
                                    <span style="color:#52c41a">[[ sizeFormat(dbInbound.up) ]]</span> /
                                    <span style="color:#1890ff">[[ sizeFormat(dbInbound.down) ]]</span>
                                </div>
                                <div v-if="dbInbound.total > 0" class="traffic-bar">
                                    <div class="traffic-bar-inner"
                                         :style="{ width: Math.min(100, (dbInbound.up + dbInbound.down) / dbInbound.total * 100) + '%', background: (dbInbound.up + dbInbound.down >= dbInbound.total) ? '#ff4d4f' : '#1890ff' }">
                                    </div>
                                </div>
                                <div v-if="dbInbound.total > 0" style="font-size:11px;color:#999;">
                                    [[ sizeFormat(dbInbound.total) ]]
                                    <span v-if="dbInbound.up + dbInbound.down >= dbInbound.total" style="color:#ff4d4f">(已超限)</span>
                                </div>
                                <a-tag v-else color="green" style="font-size:11px;">无限制</a-tag>
                            </template>
                            <template slot="settings" slot-scope="text, dbInbound">
                                <a-button type="link" size="small" @click="showInfo(dbInbound)">详情</a-button>
                            </template>
                            <template slot="stream" slot-scope="text, dbInbound, index">
                                <template v-if="dbInbound.hasStream">
                                    <a-tag color="green" class="inbound-stream-tag">[[ networkName(inbounds[index].stream.network) ]]</a-tag>
                                    <a-tag v-if="inbounds[index].stream.isTls" color="blue" class="inbound-stream-tag">TLS</a-tag>
                                    <a-tag v-if="inbounds[index].stream.isXTls" color="purple" class="inbound-stream-tag">XTLS</a-tag>
                                    <a-tag v-if="inbounds[index].stream.isReality" color="cyan" class="inbound-stream-tag">Reality</a-tag>
                                </template>
                                <span v-else style="color:#bbb;">-</span>
                            </template>
                            <template slot="enable" slot-scope="text, dbInbound">
                                <a-switch v-model="dbInbound.enable" size="small" @change="switchEnable(dbInbound)"></a-switch>
                            </template>
                            <template slot="expiryTime" slot-scope="text, dbInbound">
                                <template v-if="dbInbound.expiryTime > 0">
                                    <a-tag v-if="dbInbound.isExpiry" color="red" style="font-size:11px;">
                                        [[ DateUtil.formatMillis(dbInbound.expiryTime) ]]
                                    </a-tag>
                                    <a-tag v-else color="blue" style="font-size:11px;">
                                        [[ DateUtil.formatMillis(dbInbound.expiryTime) ]]
                                    </a-tag>
                                </template>
                                <a-tag v-else style="font-size:11px;color:#52c41a;">无限期</a-tag>
                            </template>
                        </a-table>
                    </a-card>
                </transition>
            </a-spin>
        </a-layout-content>
    </a-layout>
</a-layout>
{{template "js" .}}
<script>

    const columns = [{
        title: "操作",
        align: 'center',
        width: 60,
        scopedSlots: { customRender: 'action' },
    }, {
        title: "启用",
        align: 'center',
        width: 60,
        scopedSlots: { customRender: 'enable' },
    }, {
        title: "ID",
        align: 'center',
        dataIndex: "id",
        width: 50,
    }, {
        title: "备注",
        dataIndex: "remark",
        width: 120,
        ellipsis: true,
    }, {
        title: "协议",
        align: 'center',
        width: 100,
        scopedSlots: { customRender: 'protocol' },
    }, {
        title: "端口",
        align: 'center',
        dataIndex: "port",
        width: 70,
    }, {
        title: "流量",
        width: 160,
        scopedSlots: { customRender: 'traffic' },
    }, {
        title: "详情",
        align: 'center',
        width: 60,
        scopedSlots: { customRender: 'settings' },
    }, {
        title: "传输",
        align: 'center',
        width: 150,
        scopedSlots: { customRender: 'stream' },
    }, {
        title: "到期",
        align: 'center',
        width: 120,
        scopedSlots: { customRender: 'expiryTime' },
    }];

    const app = new Vue({
        delimiters: ['[[', ']]'],
        el: '#app',
        data: {
            siderDrawer,
            spinning: false,
            inbounds: [],
            dbInbounds: [],
            searchKey: '',
            searchedInbounds: [],
        },
        methods: {
            loading(spinning=true) {
                this.spinning = spinning;
            },
            protocolName(p) { return ProtocolNames[p] || p; },
            protocolColor(p) { return ProtocolColors[p] || '#1890ff'; },
            networkName(n) { return NetworkNames[n] || n; },
            async getDBInbounds() {
                this.loading();
                const msg = await HttpUtil.post('/xui/inbound/list');
                this.loading(false);
                if (!msg.success) {
                    return;
                }
                this.setInbounds(msg.obj);
            },
            setInbounds(dbInbounds) {
                this.inbounds.splice(0);
                this.dbInbounds.splice(0);
                for (const inbound of dbInbounds) {
                    const dbInbound = new DBInbound(inbound);
                    this.inbounds.push(dbInbound.toInbound());
                    this.dbInbounds.push(dbInbound);
                }
                this.searchInbounds(this.searchKey);
            },
            searchInbounds(key) {
                if (ObjectUtil.isEmpty(key)) {
                    this.searchedInbounds = this.dbInbounds.slice();
                } else {
                    this.searchedInbounds.splice(0);
                    this.dbInbounds.forEach(inbound => {
                        if (ObjectUtil.deepSearch(inbound, key)) {
                            this.searchedInbounds.push(inbound);
                        }
                    });
                }
            },
            clickAction(action, dbInbound) {
                switch (action.key) {
                    case "qrcode":
                        this.showQrcode(dbInbound);
                        break;
                    case "edit":
                        this.openEditInbound(dbInbound);
                        break;
                    case "resetTraffic":
                        this.resetTraffic(dbInbound);
                        break;
                    case "delete":
                        this.delInbound(dbInbound);
                        break;
                }
            },
            openAddInbound() {
                inModal.show({
                    title: '添加入站',
                    okText: '添加',
                    confirm: async (inbound, dbInbound) => {
                        const err = inbound.validateTlsConfig();
                        if (err) {
                            this.$message.error(err);
                            inModal.loading(false);
                            return;
                        }
                        inModal.loading();
                        await this.addInbound(inbound, dbInbound);
                        inModal.close();
                    }
                });
            },
            openEditInbound(dbInbound) {
                const inbound = dbInbound.toInbound();
                inModal.show({
                    title: '修改入站',
                    okText: '修改',
                    inbound: inbound,
                    dbInbound: dbInbound,
                    confirm: async (inbound, dbInbound) => {
                        const err = inbound.validateTlsConfig();
                        if (err) {
                            this.$message.error(err);
                            inModal.loading(false);
                            return;
                        }
                        inModal.loading();
                        await this.updateInbound(inbound, dbInbound);
                        inModal.close();
                    }
                });
            },
            async addInbound(inbound, dbInbound) {
                const data = {
                    up: dbInbound.up,
                    down: dbInbound.down,
                    total: dbInbound.total,
                    remark: dbInbound.remark,
                    enable: dbInbound.enable,
                    expiryTime: dbInbound.expiryTime,

                    listen: inbound.listen,
                    port: inbound.port,
                    protocol: inbound.protocol,
                    settings: inbound.settings.toString(),
                    streamSettings: inbound.stream.toString(),
                    sniffing: inbound.canSniffing() ? inbound.sniffing.toString() : '{}',
                };
                await this.submit('/xui/inbound/add', data, inModal);
            },
            async updateInbound(inbound, dbInbound) {
                const data = {
                    up: dbInbound.up,
                    down: dbInbound.down,
                    total: dbInbound.total,
                    remark: dbInbound.remark,
                    enable: dbInbound.enable,
                    expiryTime: dbInbound.expiryTime,

                    listen: inbound.listen,
                    port: inbound.port,
                    protocol: inbound.protocol,
                    settings: inbound.settings.toString(),
                    streamSettings: inbound.stream.toString(),
                    sniffing: inbound.canSniffing() ? inbound.sniffing.toString() : '{}',
                };
                await this.submit(`/xui/inbound/update/${dbInbound.id}`, data, inModal);
            },
            resetTraffic(dbInbound) {
                this.$confirm({
                    title: '重置流量',
                    content: '确定要重置流量吗?',
                    okText: '重置',
                    cancelText: '取消',
                    onOk: () => {
                        const inbound = dbInbound.toInbound();
                        dbInbound.up = 0;
                        dbInbound.down = 0;
                        this.updateInbound(inbound, dbInbound);
                    },
                });
            },
            delInbound(dbInbound) {
                this.$confirm({
                    title: '删除入站',
                    content: '确定要删除入站吗? 此操作不可恢复。',
                    okText: '删除',
                    okType: 'danger',
                    cancelText: '取消',
                    onOk: () => this.submit('/xui/inbound/del/' + dbInbound.id),
                });
            },
            showQrcode(dbInbound) {
                const link = dbInbound.genLink();
                qrModal.show('二维码', link);
            },
            showInfo(dbInbound) {
                infoModal.show(dbInbound);
            },
            switchEnable(dbInbound) {
                this.submit(`/xui/inbound/update/${dbInbound.id}`, dbInbound);
            },
            async submit(url, data, modal) {
                const msg = await HttpUtil.postWithModal(url, data, modal);
                if (msg.success) {
                    await this.getDBInbounds();
                }
            },
        },
        watch: {
            searchKey(value) {
                this.searchInbounds(value);
            }
        },
        mounted() {
            this.getDBInbounds();
        },
        computed: {
            total() {
                let down = 0, up = 0;
                for (let i = 0; i < this.dbInbounds.length; ++i) {
                    down += this.dbInbounds[i].down;
                    up += this.dbInbounds[i].up;
                }
                return {
                    down: down,
                    up: up,
                };
            }
        },
    });

</script>
{{template "inboundModal"}}
{{template "promptModal"}}
{{template "qrcodeModal"}}
{{template "textModal"}}
{{template "inboundInfoModal"}}
</body>
</html>
